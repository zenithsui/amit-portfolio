kind = "web"
previewPath = "/"
title = "kalinsky.design Clone"
version = "1.0.0"
id = "artifacts/kalinsky-clone"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24522

[services.development]
run = "pnpm --filter @workspace/kalinsky-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kalinsky-clone", "run", "build" ]
serve = "static"
publicDir = "artifacts/kalinsky-clone/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24522"
BASE_PATH = "/"
